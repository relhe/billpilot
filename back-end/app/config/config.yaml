app:
  name: BillPilot
  version: "1.0.0"
  server:
    host: "0.0.0.0"
    port: 8000

cors:
  allowed_origins:
    - "http://localhost:4200"
    - "https://www.scholarnethub.com"
  allow_credentials: true
  allow_methods:
    - "*"
  allow_headers:
    - "*"

database:
  name: "billpilot"
  collections:
    payments: "payments"
    evidence: "evidence"

storage:
  allowed_mime_types:
    - "application/pdf"
    - "image/png"
    - "image/jpeg"
