services:

  mongodb:
    image: mongo:7.0
    container_name: billpilot-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: billpilot
    volumes:
      - mongodb_data:/data/db
    networks:
      - billpilot-net

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile.dev
    container_name: billpilot-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGO_CONNECTION_STRING: >-
        mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/billpilot?authSource=admin
    volumes:
      - ./back-end:/app
    depends_on:
      - mongodb
    networks:
      - billpilot-net

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile.dev
    container_name: billpilot-frontend
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - ./front-end:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - billpilot-net

networks:
  billpilot-net:
    driver: bridge

volumes:
  mongodb_data:
