# Production compose — pulls pre-built images from Docker Hub.
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in .env or shell):
#   MONGO_ROOT_USER, MONGO_ROOT_PASSWORD, IMAGE_TAG (defaults to latest)

services:
  mongodb:
    image: mongo:7.0
    container_name: billpilot-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: billpilot
    volumes:
      - mongodb_data:/data/db
    networks:
      - billpilot-net
    # Port NOT exposed to host in production — accessed only via internal network

  backend:
    image: trimax10/billpilot-backend:${IMAGE_TAG:-latest}
    container_name: billpilot-backend
    restart: unless-stopped
    environment:
      MONGO_CONNECTION_STRING: >-
        mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/billpilot?authSource=admin
    depends_on:
      - mongodb
    networks:
      - billpilot-net

  frontend:
    image: trimax10/billpilot-frontend:${IMAGE_TAG:-latest}
    container_name: billpilot-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - billpilot-net

networks:
  billpilot-net:
    driver: bridge

volumes:
  mongodb_data:
